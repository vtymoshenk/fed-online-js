<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>18.3</title>
    <script src="main.js"></script>
</head>
<body>
<select class="pizzas">
  <option value="">select  pizza</option>
  <option value="Pepperoni">Pepperoni</option>
  <option value="cheese">Four Cheese</option>
  <option value="hawaiian">Hawaiian</option>
  <option value="capricciosa">Capricciosa</option>
</select>


<!-- size -->
<form class="size">
<p>select size</p>
<div>
  <input type="radio" name="size" id="big" value="big">
  <label for="b">big</label>
</div>
<div>
  <input type="radio" name="size" id="medium" value="medium">
  <label for="m">medium</label>
</div>
<div>
  <input type="radio" name="size" id="small" value="small">
  <label for="s">small</label>
</div>
</form>

<!-- toping -->
<form class="toppings">
<p>select pizza toppings </p>
<div>
  <input type="checkbox" name="topping" id="bacon" value="bacon">
  <label for="bacon">Bacon</label>
</div>
<div>
  <input type="checkbox" name="topping" id="salami" value="salami">
  <label for="salami">Salami</label>
</div>
<div>
  <input type="checkbox" name="topping" id="mushrooms" value="mushrooms">
  <label for="mushrooms">Mushrooms</label>
</div>
<div>
  <input type="checkbox" name="topping" id="basil" value="basil">
  <label for="basil">Basil</label>
</div>
</form>

<!-- output -->
<div class="information"></div>

</body>
</html>
